services:
  ai-rules-mcp:
    build: .
    container_name: ai-rules-mcp
    ports:
      - "3000:3000"
    environment:
      # ── Required ──────────────────────────────────────
      # HTTPS URL of your skills repo
      SKILLS_REPO_URL: "https://github.com/Greg-Klein/ai-rules-skills.git"

      # ── For private repos (uncomment) ─────────────────
      # GIT_TOKEN: "${GIT_TOKEN}"  # set via .env file or CI secret

      # ── Optional ──────────────────────────────────────
      SKILLS_REPO_BRANCH: "main"
      SKILLS_SUBDIR: "skills" # path inside repo where SKILL.md files live
      SYNC_INTERVAL_SEC: "300" # pull every 5 min
      PORT: "3000"
    volumes:
      - skills-data:/data # persists cloned repo between restarts
    restart: unless-stopped

volumes:
  skills-data:
